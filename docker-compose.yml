version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: resumeiq_postgres
    environment:
      POSTGRES_DB: resumeiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend/resumeiq-api
    container_name: resumeiq_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/resumeiq
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: resumeiq_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
