<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bluePurpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="70%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="250" cy="220" r="170" fill="none" stroke="url(#bluePurpleGrad)" stroke-width="8" opacity="0.85" filter="url(#softGlow)" />

  <!-- 1. Resume Document -->
  <g transform="translate(140, 100)">
    <!-- White Card background -->
    <rect x="0" y="0" width="160" height="210" rx="16" fill="#ffffff" filter="drop-shadow(0px 8px 16px rgba(15, 23, 42, 0.08))" />
    <!-- Folded top-right corner -->
    <path d="M 125,0 L 160,35 L 160,0 Z" fill="#e2e8f0" />
    <path d="M 125,0 L 125,25 rx 4 L 160,25" fill="none" stroke="#cbd5e1" stroke-width="2" />
    
    <!-- Profile Avatar placeholder -->
    <circle cx="45" cy="50" r="22" fill="#e2e8f0" />
    <circle cx="45" cy="44" r="10" fill="#94a3b8" />
    <path d="M 28,64 C 28,56 36,54 45,54 C 54,54 62,56 62,64 Z" fill="#94a3b8" />

    <!-- Text Lines -->
    <rect x="80" y="38" width="60" height="6" rx="3" fill="#cbd5e1" />
    <rect x="80" y="52" width="45" height="6" rx="3" fill="#cbd5e1" />
    
    <rect x="25" y="85" width="110" height="6" rx="3" fill="#94a3b8" />
    <rect x="25" y="100" width="110" height="6" rx="3" fill="#cbd5e1" />
    <rect x="25" y="115" width="95" height="6" rx="3" fill="#cbd5e1" />

    <!-- Checkmark bullets -->
    <g transform="translate(25, 135)">
      <!-- Row 1 -->
      <path d="M0,5 L3,8 L8,2" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <rect x="15" y="2" width="60" height="4" rx="2" fill="#cbd5e1" />
      <!-- Row 2 -->
      <path d="M0,17 L3,20 L8,14" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <rect x="15" y="14" width="75" height="4" rx="2" fill="#cbd5e1" />
      <!-- Row 3 -->
      <path d="M0,29 L3,32 L8,26" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <rect x="15" y="26" width="50" height="4" rx="2" fill="#cbd5e1" />
    </g>
  </g>

  <!-- 2. AI Brain Circuit -->
  <g transform="translate(270, 130)">
    <!-- Right side brain hemisphere shape -->
    <path d="M15,10 C45,10 70,30 70,65 C70,100 50,115 45,120 C30,120 20,110 15,100 Z" fill="url(#bluePurpleGrad)" opacity="0.9" />
    
    <!-- Circuit lines & nodes -->
    <g stroke="#ffffff" stroke-width="2" fill="#ffffff">
      <!-- Node 1 -->
      <circle cx="25" cy="30" r="4" />
      <path d="M25,30 L45,30 L55,45" fill="none" />
      <!-- Node 2 -->
      <circle cx="35" cy="60" r="4" />
      <path d="M35,60 L55,60" fill="none" />
      <circle cx="55" cy="60" r="4" />
      <!-- Node 3 -->
      <circle cx="28" cy="90" r="4" />
      <path d="M28,90 L48,90 L58,75" fill="none" />
    </g>
  </g>

  <!-- 3. Magnifying Glass with IQ -->
  <g transform="translate(225, 185)">
    <!-- Glass circle -->
    <circle cx="45" cy="45" r="42" fill="#ffffff" stroke="#0f172a" stroke-width="10" filter="drop-shadow(0px 8px 16px rgba(15, 23, 42, 0.15))" />
    <!-- Handle -->
    <rect x="75" y="70" width="12" height="40" rx="6" transform="rotate(-45, 75, 70)" fill="#0f172a" />
    
    <!-- "IQ" Text centered -->
    <text x="45" y="55" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="32" fill="#6366F1" text-anchor="middle">IQ</text>
  </g>
</svg>
